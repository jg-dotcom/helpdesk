<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  body { margin: 0; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</helmet>

<div style="min-height:100vh; box-sizing:border-box; display:flex; background:{{ cBg }}; color:{{ cText }}; font-family:'Inter',sans-serif;">

  <nav style="width:224px; flex-shrink:0; padding:24px 16px; display:flex; flex-direction:column; gap:1px;">
    <div style="display:flex; align-items:center; gap:9px; padding:8px 12px 22px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="2" width="20" height="20" rx="7" fill="{{ cAccent }}"/>
        <path d="M8 16V8m0 4h8m0-4v8" stroke="{{ cAccentText }}" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span style="font-size:15px; font-weight:800; letter-spacing:-0.01em;">Helpdesk</span>
    </div>
    <sc-for list="{{ navItems }}" as="n" hint-placeholder-count="8">
      <div style="display:flex; align-items:center; gap:11px; padding:8px 10px; border-radius:7px; font-size:13.5px; font-weight:{{ n.weight }}; color:{{ n.color }}; background:{{ n.bg }}; border-left:2px solid {{ n.accentBorder }};">
        <span style="width:16px; height:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center;">
          <sc-if value="{{ n.isDashboard }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="9" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="3" width="7" height="5" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="12" width="7" height="9" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="16" width="7" height="5" rx="1.5" stroke="currentColor" stroke-width="1.8"/></svg></sc-if>
          <sc-if value="{{ n.isEmployees }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3.2" stroke="currentColor" stroke-width="1.8"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.8"/><circle cx="18" cy="8" r="2.4" stroke="currentColor" stroke-width="1.6"/></svg></sc-if>
          <sc-if value="{{ n.isPayroll }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="1.6" stroke="currentColor" stroke-width="1.8"/><path d="M3 10h18" stroke="currentColor" stroke-width="1.6"/><circle cx="8" cy="14.5" r="1.4" fill="currentColor"/></svg></sc-if>
          <sc-if value="{{ n.isTime }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></sc-if>
          <sc-if value="{{ n.isMessages }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 5h16v11H8l-4 4V5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></sc-if>
          <sc-if value="{{ n.isReports }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 20V10M11 20V4M18 20v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></sc-if>
          <sc-if value="{{ n.isActivity }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 12h4l2-7 4 14 2-7h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></sc-if>
          <sc-if value="{{ n.isSettings }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M12 3v2.5M12 18.5V21M4.2 4.2l1.8 1.8M18 18l1.8 1.8M3 12h2.5M18.5 12H21M4.2 19.8L6 18M18 6l1.8-1.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></sc-if>
        </span>
        {{ n.label }}
      </div>
    </sc-for>
  </nav>

  <div style="flex:1; min-width:0;">
    <header style="display:flex; align-items:center; justify-content:space-between; padding:24px 40px 0;">
      <div>
        <h1 style="font-size:28px; font-weight:800; letter-spacing:-0.02em; margin:0;">Good morning, Alex</h1>
        <div style="display:flex; align-items:center; gap:8px; margin-top:8px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="transform:rotate(8deg); flex-shrink:0;"><rect x="3" y="3" width="18" height="18" rx="5" stroke="{{ cAccent }}" stroke-width="2.5"/></svg>
          <div style="font-size:14.5px; color:{{ cTextSecondary }};">{{ todayLabel }} · {{ companyName }}</div>
        </div>
      </div>
      <button onClick="{{ toggleTheme }}" aria-label="Toggle color theme" style="display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:999px; border:none; background:{{ cBgElevated }}; color:{{ cTextSecondary }}; cursor:pointer;" style-hover="color:{{ cText }};">
        <sc-if value="{{ isDark }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8L6 18M18 6l1.8-1.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></sc-if>
        <sc-if value="{{ isLight }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20.5 14.5A8.5 8.5 0 1 1 9.5 3.5a7 7 0 0 0 11 11Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></sc-if>
      </button>
    </header>

    <div style="padding:32px 40px 80px; display:flex; flex-direction:column; gap:48px;">

      <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:0;">
        <sc-for list="{{ stats }}" as="s" hint-placeholder-count="4">
          <div style="padding:0 28px; border-left:1px solid {{ s.showBorder }};">
            <div style="font-size:13px; font-weight:600; color:{{ cTextTertiary }}; margin-bottom:10px;">{{ s.label }}</div>
            <div style="width:18px; height:3px; border-radius:2px; background:{{ s.deltaColor }}; margin-bottom:10px;"></div>
            <div style="font-size:30px; font-weight:800; letter-spacing:-0.02em;">{{ s.value }}</div>
            <div style="font-size:13px; color:{{ s.deltaColor }}; margin-top:6px;">{{ s.delta }}</div>
          </div>
        </sc-for>
      </div>

      <div style="display:grid; grid-template-columns:1.4fr 1fr; gap:56px; align-items:start;">
        <div>
          <div style="display:flex; align-items:baseline; justify-content:space-between; margin-bottom:20px;">
            <h2 style="font-size:17px; font-weight:700; letter-spacing:-0.01em; margin:0;">Needs your attention</h2>
            <span style="font-size:13.5px; color:{{ cAccent }}; cursor:pointer;">View all</span>
          </div>
          <div>
            <sc-for list="{{ attentionItems }}" as="a" hint-placeholder-count="4">
              <div style="display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 0; border-top:1px solid {{ cBorder }};">
                <div style="display:flex; align-items:center; gap:14px; min-width:0;">
                  <div style="width:32px; height:32px; border-radius:9px; background:{{ a.iconBg }}; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:{{ a.iconColor }};">
                    <sc-if value="{{ a.isTimeOff }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 10h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></sc-if>
                    <sc-if value="{{ a.isDoc }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.8"/><path d="M9 13h6M9 17h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></sc-if>
                    <sc-if value="{{ a.isClock }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></sc-if>
                    <sc-if value="{{ a.isApplication }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.8"/><path d="M5 20c0-3.9 3.1-7 7-7s7 3.1 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></sc-if>
                  </div>
                  <div style="min-width:0;">
                    <div style="font-size:14.5px; color:{{ cText }};">{{ a.title }}</div>
                    <div style="font-size:13px; color:{{ cTextTertiary }}; margin-top:2px;">{{ a.subtitle }}</div>
                  </div>
                </div>
                <button style="background:{{ a.actionBg }}; border:none; border-radius:999px; color:{{ cAccent }}; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; flex-shrink:0; padding:7px 15px;">{{ a.action }}</button>
              </div>
            </sc-for>
          </div>
        </div>

        <div>
          <h2 style="font-size:17px; font-weight:700; letter-spacing:-0.01em; margin:0 0 20px;">Upcoming</h2>
          <div style="background:{{ cBgElevated }}; border-radius:14px; padding:20px 24px;">
            <sc-for list="{{ upcoming }}" as="u" hint-placeholder-count="3">
              <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-top:1px solid {{ u.topBorder }};">
                <div>
                  <div style="font-size:14px; color:{{ cText }};">{{ u.title }}</div>
                  <div style="font-size:12.5px; color:{{ cTextTertiary }}; margin-top:2px;">{{ u.when }}</div>
                </div>
              </div>
            </sc-for>
          </div>
        </div>
      </div>

      <div>
        <h2 style="font-size:17px; font-weight:700; letter-spacing:-0.01em; margin:0 0 20px;">Recent activity</h2>
        <div>
          <sc-for list="{{ activity }}" as="ac" hint-placeholder-count="5">
            <div style="display:flex; align-items:center; gap:14px; padding:13px 0; border-top:1px solid {{ cBorder }};">
              <div style="width:30px; height:30px; border-radius:999px; background:{{ ac.avatarColor }}; color:{{ cAccentText }}; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0;">{{ ac.initials }}</div>
              <div style="font-size:14px; color:{{ cTextSecondary }};">{{ ac.text }}</div>
              <div style="margin-left:auto; font-size:12.5px; color:{{ cTextTertiary }}; flex-shrink:0;">{{ ac.time }}</div>
            </div>
          </sc-for>
        </div>
      </div>

    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { theme: 'dark' };

  componentDidMount() {
    try {
      const saved = localStorage.getItem('helpdesk-careers-theme');
      if (saved === 'light' || saved === 'dark') this.setState({ theme: saved });
    } catch (e) {}
  }

  toggleTheme = () => {
    const next = this.state.theme === 'dark' ? 'light' : 'dark';
    this.setState({ theme: next });
    try { localStorage.setItem('helpdesk-careers-theme', next); } catch (e) {}
  };

  renderVals() {
    const isDark = this.state.theme === 'dark';
    const dark = {
      cBg: 'oklch(17% 0.012 260)', cBgElevated: 'oklch(21% 0.014 258)', cBorder: 'oklch(28% 0.018 258)',
      cText: 'oklch(95% 0.006 90)', cTextSecondary: 'oklch(72% 0.02 250)', cTextTertiary: 'oklch(52% 0.02 250)',
      cAccent: 'oklch(64% 0.15 250)', cAccentText: 'oklch(99% 0 0)', cAmber: 'oklch(70% 0.15 55)',
      cSuccessDelta: 'oklch(68% 0.15 145)', cWarnDelta: 'oklch(75% 0.14 85)', cErrorDot: 'oklch(72% 0.16 25)', cWarnDot: 'oklch(75% 0.14 85)',
    };
    const light = {
      cBg: 'oklch(98% 0.004 90)', cBgElevated: 'oklch(95% 0.006 85)', cBorder: 'oklch(88% 0.01 90)',
      cText: 'oklch(22% 0.01 260)', cTextSecondary: 'oklch(42% 0.015 255)', cTextTertiary: 'oklch(58% 0.015 255)',
      cAccent: 'oklch(48% 0.14 250)', cAccentText: 'oklch(99% 0 0)', cAmber: 'oklch(58% 0.16 55)',
      cSuccessDelta: 'oklch(45% 0.13 145)', cWarnDelta: 'oklch(50% 0.13 85)', cErrorDot: 'oklch(50% 0.19 25)', cWarnDot: 'oklch(55% 0.13 85)',
    };
    const c = isDark ? dark : light;

    const navDefs = [
      { label: 'Dashboard', key: 'isDashboard', active: true }, { label: 'Employees', key: 'isEmployees', active: false }, { label: 'Payroll', key: 'isPayroll', active: false },
      { label: 'Time & Attendance', key: 'isTime', active: false }, { label: 'Messages', key: 'isMessages', active: false }, { label: 'Reports', key: 'isReports', active: false },
      { label: 'Activity', key: 'isActivity', active: false }, { label: 'Settings', key: 'isSettings', active: false },
    ];
    const navItems = navDefs.map(n => ({
      label: n.label, weight: n.active ? 700 : 500,
      color: n.active ? c.cText : c.cTextSecondary,
      bg: n.active ? c.cBgElevated : 'transparent',
      accentBorder: n.active ? c.cAccent : 'transparent',
      isDashboard: n.key === 'isDashboard', isEmployees: n.key === 'isEmployees', isPayroll: n.key === 'isPayroll',
      isTime: n.key === 'isTime', isMessages: n.key === 'isMessages', isReports: n.key === 'isReports',
      isActivity: n.key === 'isActivity', isSettings: n.key === 'isSettings',
    }));

    const statDefs = [
      { label: 'Active employees', value: '14', delta: '+1 this month', deltaKind: 'good' },
      { label: 'Open shifts', value: '3', delta: 'Next 7 days', deltaKind: 'neutral' },
      { label: 'Pending time off', value: '3', delta: '2 need review', deltaKind: 'warn' },
      { label: 'Last payroll run', value: '$28.3K', delta: 'Jul 12 · no issues', deltaKind: 'good' },
    ];
    const stats = statDefs.map((s, i) => ({
      label: s.label, value: s.value, delta: s.delta,
      deltaColor: s.deltaKind === 'good' ? c.cSuccessDelta : s.deltaKind === 'warn' ? c.cWarnDelta : c.cTextTertiary,
      showBorder: i === 0 ? 'transparent' : c.cBorder,
    }));

    const attentionDefs = [
      { title: 'Priya Shah requested Jul 22–24 off', subtitle: 'Submitted yesterday', action: 'Review', kind: 'timeOff' },
      { title: 'Marcus Webb\u2019s I-9 is still unsigned', subtitle: 'Due before his first shift on Jul 21', action: 'Remind', kind: 'doc' },
      { title: '2 employees haven\u2019t clocked out today', subtitle: 'Leo Bennett, Sam Torres', action: 'View', kind: 'clock' },
      { title: 'New application: Veterinary Technician', subtitle: 'Jordan Alvarez applied 2 hours ago', action: 'View', kind: 'application' },
    ];
    const kindColors = {
      timeOff: c.cWarnDot, doc: c.cErrorDot, clock: c.cWarnDot, application: c.cAccent,
    };
    const attentionItems = attentionDefs.map(a => ({
      title: a.title, subtitle: a.subtitle, action: a.action,
      isTimeOff: a.kind === 'timeOff', isDoc: a.kind === 'doc', isClock: a.kind === 'clock', isApplication: a.kind === 'application',
      iconColor: kindColors[a.kind], iconBg: c.cBgElevated, actionBg: c.cBgElevated,
    }));

    const upcomingDefs = [
      { title: 'Payroll run', when: 'Fri, Jul 25' },
      { title: 'Marcus Webb starts', when: 'Mon, Jul 21' },
      { title: 'Quarterly review meeting', when: 'Wed, Jul 30' },
    ];
    const upcoming = upcomingDefs.map((u, i) => ({ ...u, topBorder: i === 0 ? 'transparent' : c.cBorder }));

    const activityDefs = [
      { initials: 'PS', text: 'Priya Shah submitted a time-off request', time: '1h ago', amber: true },
      { initials: 'MW', text: 'Marcus Webb signed his direct deposit form', time: '3h ago' },
      { initials: 'ST', text: 'Sam Torres clocked in', time: '5h ago' },
      { initials: 'AJ', text: 'Alex Jennings ran payroll for Jul 12', time: 'Yesterday' },
      { initials: 'LB', text: 'Leo Bennett updated his availability', time: '2 days ago', amber: true },
    ].map(a => ({ ...a, avatarColor: a.amber ? c.cAmber : c.cAccent }));

    return {
      isDark, isLight: !isDark, toggleTheme: this.toggleTheme, ...c,
      companyName: 'Harbor Lane Veterinary Clinic',
      todayLabel: 'Saturday, July 18',
      navItems, stats, attentionItems, upcoming, activity: activityDefs,
    };
  }
}

</script>
</body>
</html>
